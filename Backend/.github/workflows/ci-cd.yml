name: CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore projects
        shell: bash
        run: |
          find . -name "*.csproj" -not -path "*/obj/*" -print0 | while IFS= read -r -d '' project; do
            dotnet restore "$project"
          done

      - name: Build projects
        shell: bash
        run: |
          find . -name "*.csproj" -not -path "*/obj/*" -print0 | while IFS= read -r -d '' project; do
            dotnet build "$project" -c Release --no-restore
          done

      - name: Run tests
        shell: bash
        run: |
          mapfile -t tests < <(find . -name "*Test*.csproj" -o -name "*Tests*.csproj" | grep -v '/obj/' || true)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "No test projects found."
            exit 0
          fi

          for project in "${tests[@]}"; do
            dotnet test "$project" -c Release --no-build --logger "trx;LogFileName=test-results.trx"
          done

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker images with docker-compose
        run: docker compose build

      - name: Push Docker images
        run: docker compose push
