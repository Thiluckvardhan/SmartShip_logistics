version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

  identity-service:
    image: ${DOCKER_USERNAME:-local}/smartship-identity-service:latest
    build:
      context: .
      dockerfile: services/SmartShip.IdentityService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SmartShip.IdentityService: ${IDENTITY_DB_CONNECTION}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      EmailSettings__SmtpHost: ${EMAIL_SMTP_HOST}
      EmailSettings__Port: 587
      EmailSettings__EnableSsl: "true"
      EmailSettings__SenderEmail: ${EMAIL_SENDER}
      EmailSettings__SenderPassword: ${EMAIL_PASSWORD}
    depends_on:
      - sqlserver
      - rabbitmq
    ports:
      - "8001:8080"

  shipment-service:
    image: ${DOCKER_USERNAME:-local}/smartship-shipment-service:latest
    build:
      context: .
      dockerfile: services/SmartShip.ShipmentService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SmartShip.ShipmentService: ${SHIPMENT_DB_CONNECTION}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Services__IdentityServiceBaseUrl: http://identity-service:8080
      EmailSettings__SmtpHost: ${EMAIL_SMTP_HOST}
      EmailSettings__Port: 587
      EmailSettings__EnableSsl: "true"
      EmailSettings__SenderEmail: ${EMAIL_SENDER}
      EmailSettings__SenderPassword: ${EMAIL_PASSWORD}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__Exchange: smartship_events
      RabbitMQ__RetryCount: 5
      RabbitMQ__RetryDelayMs: 500
    depends_on:
      - sqlserver
      - rabbitmq
    ports:
      - "8002:8080"

  tracking-service:
    image: ${DOCKER_USERNAME:-local}/smartship-tracking-service:latest
    build:
      context: .
      dockerfile: services/SmartShip.TrackingService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SmartShip.TrackingService: ${TRACKING_DB_CONNECTION}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__Exchange: smartship_events
    depends_on:
      - sqlserver
      - rabbitmq
    ports:
      - "8003:8080"

  document-service:
    image: ${DOCKER_USERNAME:-local}/smartship-document-service:latest
    build:
      context: .
      dockerfile: services/SmartShip.DocumentService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SmartShip.DocumentService: ${DOCUMENT_DB_CONNECTION}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
    depends_on:
      - sqlserver
      - rabbitmq
    ports:
      - "8004:8080"

  admin-service:
    image: ${DOCKER_USERNAME:-local}/smartship-admin-service:latest
    build:
      context: .
      dockerfile: services/SmartShip.AdminService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SmartShip.AdminService: ${ADMIN_DB_CONNECTION}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Services__ShipmentServiceBaseUrl: ${SHIPMENT_SERVICE_BASE_URL}
    depends_on:
      - sqlserver
      - shipment-service
    ports:
      - "8005:8080"

  gateway:
    image: ${DOCKER_USERNAME:-local}/smartship-gateway:latest
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - identity-service
      - shipment-service
      - tracking-service
      - document-service
      - admin-service
    ports:
      - "8000:8080"

volumes:
  sqlserver-data:
