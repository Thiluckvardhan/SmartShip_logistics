<div class="admin-shell" [class.collapsed]="sidebarCollapsed()">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 8h14M5 8a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v0a2 2 0 01-2 2M5 8l1 8a2 2 0 002 2h8a2 2 0 002-2l1-8"/>
            <path d="M10 12h4"/>
          </svg>
        </div>
        <span class="brand-name">SmartShip</span>
      </div>
      <button class="collapse-btn" (click)="toggleSidebar()" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         class="nav-item"
         [class.active]="isActive(item.path)"
         [title]="item.label">
        <span class="nav-icon" [innerHTML]="getIcon(item.icon)"></span>
        <span class="nav-label">{{ item.label }}</span>
        <span class="active-dot" *ngIf="isActive(item.path)"></span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-label">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- ── Main Area ───────────────────────────────────── -->
  <div class="main-area">

    <!-- Top Navbar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="page-breadcrumb">Admin Panel</div>
      </div>
      <div class="top-bar-right">
        <div class="notif-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
        </div>
        <div
          class="user-chip"
          *ngIf="currentUser$ | async as user"
          (click)="openProfile()"
          (keydown.enter)="openProfile()"
          (keydown.space)="openProfile()"
          tabindex="0"
          role="button"
          aria-label="Open profile">
          <div class="user-avatar">{{ user.name?.charAt(0)?.toUpperCase() || 'A' }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-role">Admin</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
