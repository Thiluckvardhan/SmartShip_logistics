<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Reset Password</h1>

    <div class="token-warning" *ngIf="!token">
      <p>Invalid or missing reset token. Please request a new password reset link.</p>
      <a routerLink="/forgot-password" class="btn-primary">Request Reset Link</a>
    </div>

    <ng-container *ngIf="token">
      <p class="auth-subtitle">Enter your new password below.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            id="newPassword"
            type="password"
            formControlName="newPassword"
            placeholder="••••••"
            [class.input-error]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched"
          />
          <div class="error-message" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            <span *ngIf="form.get('newPassword')?.errors?.['required']">Password is required.</span>
            <span *ngIf="form.get('newPassword')?.errors?.['minlength']">Password must be at least 6 characters.</span>
            <span *ngIf="form.get('newPassword')?.errors?.['maxlength']">Password must not exceed 100 characters.</span>
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="form.invalid || isLoading"
        >
          <span *ngIf="isLoading">Resetting...</span>
          <span *ngIf="!isLoading">Reset Password</span>
        </button>
      </form>

      <div class="auth-links">
        <a routerLink="/login">Back to Sign In</a>
      </div>
    </ng-container>
  </div>
</div>
