<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Forgot Password</h1>

    <div class="success-message" *ngIf="submitted">
      <p>Check your inbox — we've sent a password reset link to your email address.</p>
      <a routerLink="/login" class="btn-primary">Back to Sign In</a>
    </div>

    <ng-container *ngIf="!submitted">
      <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
          />
          <div class="error-message" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            <span *ngIf="form.get('email')?.errors?.['required']">Email is required.</span>
            <span *ngIf="form.get('email')?.errors?.['email']">Please enter a valid email address.</span>
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="form.invalid || isLoading"
        >
          <span *ngIf="isLoading">Sending...</span>
          <span *ngIf="!isLoading">Send Reset Link</span>
        </button>
      </form>

      <div class="auth-links">
        <a routerLink="/login">Back to Sign In</a>
      </div>
    </ng-container>
  </div>
</div>
