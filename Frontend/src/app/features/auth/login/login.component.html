<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Welcome Back</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <div class="error-message" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          <span *ngIf="form.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="form.get('email')?.errors?.['email']">Please enter a valid email address.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••"
          [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <div class="error-message" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          <span *ngIf="form.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="form.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <button
        type="submit"
        class="btn-primary"
        [disabled]="form.invalid || isLoading"
      >
        <span *ngIf="isLoading">Signing in...</span>
        <span *ngIf="!isLoading">Sign In</span>
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/forgot-password">Forgot password?</a>
      <span>Don't have an account? <a routerLink="/register">Create one</a></span>
    </div>
  </div>
</div>
