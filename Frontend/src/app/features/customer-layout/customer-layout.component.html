<div class="customer-shell" [class.menu-open]="menuOpen()">

  <!-- Mobile overlay -->
  <div class="overlay" *ngIf="menuOpen()" (click)="menuOpen.set(false)"></div>

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 8h14M5 8a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v0a2 2 0 01-2 2M5 8l1 8a2 2 0 002 2h8a2 2 0 002-2l1-8"/>
            <path d="M10 12h4"/>
          </svg>
        </div>
        <span class="brand-name">SmartShip</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         class="nav-item"
         [class.active]="isActive(item.path)"
         [title]="item.label">
        <span class="nav-icon" [innerHTML]="getIcon(item.icon)"></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- ── Main Area ───────────────────────────────────── -->
  <div class="main-area">

    <!-- Top Bar -->
    <header class="top-bar">
      <button class="hamburger" (click)="menuOpen.set(!menuOpen())" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="top-brand">SmartShip</div>
      <div class="top-actions">
        <div
          class="user-chip"
          *ngIf="currentUser$ | async as user"
          (click)="openProfile()"
          (keydown.enter)="openProfile()"
          (keydown.space)="openProfile()"
          tabindex="0"
          role="button"
          aria-label="Open profile">
          <div class="user-avatar">{{ user.name?.charAt(0)?.toUpperCase() || 'U' }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-role">Customer</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
